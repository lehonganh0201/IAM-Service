services:
  iam-postgres:
    image: postgres:18.4-alpine
    container_name: iam-service-2-postgres
    environment:
      POSTGRES_DB: ${IAM_DB_NAME:-iam_service_2}
      POSTGRES_USER: ${IAM_DB_USERNAME:-iam_user}
      POSTGRES_PASSWORD: ${IAM_DB_PASSWORD:-iam_password}
    ports:
      - "${IAM_DB_PORT:-5432}:5432"
    volumes:
      - iam_postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${IAM_DB_USERNAME:-iam_user} -d ${IAM_DB_NAME:-iam_service_2}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - iam-net

  keycloak-postgres:
    image: postgres:18.4-alpine
    container_name: iam-service-2-keycloak-postgres
    environment:
      POSTGRES_DB: ${KEYCLOAK_DB_NAME:-keycloak}
      POSTGRES_USER: ${KEYCLOAK_DB_USERNAME:-keycloak}
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-keycloak_password}
    ports:
      - "${KEYCLOAK_DB_PORT:-5433}:5432"
    volumes:
      - keycloak_postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${KEYCLOAK_DB_USERNAME:-keycloak} -d ${KEYCLOAK_DB_NAME:-keycloak}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - iam-net

  keycloak:
    image: quay.io/keycloak/keycloak:26.6.3
    container_name: iam-service-2-keycloak
    command: start-dev
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_BOOTSTRAP_ADMIN_USERNAME:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_BOOTSTRAP_ADMIN_PASSWORD:-admin}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-postgres:5432/${KEYCLOAK_DB_NAME:-keycloak}
      KC_DB_USERNAME: ${KEYCLOAK_DB_USERNAME:-keycloak}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-keycloak_password}
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
    ports:
      - "${KEYCLOAK_HTTP_PORT:-8081}:8080"
    depends_on:
      keycloak-postgres:
        condition: service_healthy
    networks:
      - iam-net

volumes:
  iam_postgres_data:
  keycloak_postgres_data:

networks:
  iam-net:
    driver: bridge
